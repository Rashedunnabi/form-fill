<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Smart Form Fill</title>
		<link rel="stylesheet" href="popup.css" />
	</head>
	<body>
		<main class="popup">
			<h1>Smart Form Fill</h1>
			<p class="hint">Save once, fill anywhere.</p>

			<div class="actions">
				<button id="fillNow" type="button">Fill This Page</button>
				<button id="openOptions" type="button" class="secondary">
					Manage Information
				</button>
			</div>

			<p id="status" class="status" aria-live="polite"></p>
		</main>
		<script src="popup.js"></script>
	</body>
</html>
