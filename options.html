<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Smart Form Fill Settings</title>
		<link rel="stylesheet" href="options.css" />
	</head>
	<body>
		<main class="layout">
			<section class="card">
				<h1>Saved Information</h1>
				<p class="sub">
					Add your details once. The extension can reuse them on any
					site.
				</p>

				<div class="template-box">
					<button
						id="loadBkkbTemplate"
						type="button"
						class="template-btn"
					>
						Load BKKB Required Fields Template
					</button>
					<p class="template-hint">
						Adds common required field keys used in Teletalk BKKB
						forms.
					</p>
				</div>

				<div class="toolbar">
					<button id="exportJson" type="button" class="secondary-btn">
						Export JSON Backup
					</button>
					<button id="importJson" type="button" class="secondary-btn">
						Import JSON Backup
					</button>
					<input
						id="importFile"
						type="file"
						accept="application/json"
						hidden
					/>
				</div>

				<form id="fieldForm" class="form">
					<label>
						Field Name
						<input
							id="fieldName"
							name="fieldName"
							type="text"
							placeholder="e.g. name, mobile, present_district, ssc_exam"
							required
						/>
					</label>

					<label>
						Value
						<textarea
							id="fieldValue"
							name="fieldValue"
							rows="3"
							placeholder="Your value"
							required
						></textarea>
					</label>

					<div class="form-actions">
						<button id="submitField" type="submit">
							Save Field
						</button>
						<button
							id="cancelEdit"
							type="button"
							class="secondary-btn hidden"
						>
							Cancel Edit
						</button>
					</div>
				</form>

				<p id="saveStatus" class="status" aria-live="polite"></p>
			</section>

			<section class="card">
				<h2>Current Fields</h2>
				<ul id="fieldList" class="field-list"></ul>
			</section>
		</main>

		<script src="options.js"></script>
	</body>
</html>
